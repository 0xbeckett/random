<!DOCTYPE html>
<html lang="zxx">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>̷̢r̴a̶n̷d̸o̴m̵ ̶?̷?̴?̸</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;height:100%;background:#000;}
  body{font-family:sans-serif;}
  #stage{position:fixed;inset:0;}
  .blob{position:absolute;will-change:transform,opacity;user-select:none;white-space:nowrap;
        cursor:crosshair;text-shadow:0 0 1px currentColor;pointer-events:none;}
  #noise{position:fixed;inset:0;pointer-events:none;mix-blend-mode:overlay;opacity:.09;z-index:9999;}
  #flash{position:fixed;inset:0;pointer-events:none;z-index:9998;}
  .spin{animation:spin var(--sp,4s) linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #hint{position:fixed;left:6px;bottom:4px;color:#555;font:10px monospace;z-index:10000;mix-blend-mode:difference;}
  #src{position:fixed;right:6px;bottom:4px;font:10px monospace;z-index:10001;padding:2px 6px;border-radius:3px;
       letter-spacing:.5px;background:rgba(0,0,0,.55);border:1px solid currentColor;color:#666;}
  #src.q{color:#3ff0c0;text-shadow:0 0 6px #3ff0c0;}
  #src.f{color:#ffab40;}
  #src b{opacity:.6;font-weight:normal;}
</style>
</head>
<body>
<div id="stage"></div>
<canvas id="noise"></canvas>
<div id="flash"></div>
<div id="hint">click / tap / move — feed it</div>
<div id="src" class="f" title="entropy source"><b>src:</b> <span id="srclbl">…</span></div>
<script>
(function(){
"use strict";
var F=Math.floor;

// ---------- QUANTUM ENTROPY (ANU QRNG) with buffered refill + graceful fallback ----------
// Draws uint16 values from https://qrng.anu.edu.au/API/jsonI.php and normalizes to [0,1).
// Never blocks: every draw returns instantly (buffer or Math.random). Refills happen async.
var QRNG={
  buf:[],            // buffered uint16 values (0..65535)
  i:0,               // read cursor
  LOW:256,           // refill when fewer than this remain
  BATCH:1024,        // ANU max length per request
  fetching:false,
  cooldownUntil:0,   // ms epoch; ANU rate-limits ~1 req/min
  usedQuantum:false, // whether last draw came from quantum buffer
  ok:false,          // whether a fetch has ever succeeded
  remaining:function(){return this.buf.length-this.i;},
  refill:function(){
    var now=Date.now();
    if(this.fetching||now<this.cooldownUntil)return;
    if(this.remaining()>this.LOW)return;
    this.fetching=true;
    var self=this;
    var ctl=(typeof AbortController!=='undefined')?new AbortController():null;
    var timer=setTimeout(function(){if(ctl)ctl.abort();},6000); // hard timeout so nothing hangs
    fetch('https://qrng.anu.edu.au/API/jsonI.php?length='+this.BATCH+'&type=uint16',
      ctl?{signal:ctl.signal,cache:'no-store'}:{cache:'no-store'})
      .then(function(r){if(!r.ok)throw new Error('http '+r.status);return r.json();})
      .then(function(j){
        if(!j||!j.success||!j.data||!j.data.length)throw new Error('bad payload');
        // drop consumed head, append fresh entropy
        if(self.i>0){self.buf=self.buf.slice(self.i);self.i=0;}
        self.buf=self.buf.concat(j.data);
        self.ok=true;
        self.cooldownUntil=Date.now()+65000; // respect ~1 req/min
      })
      .catch(function(){
        // failure / timeout / rate-limit / CORS: back off, keep serving Math.random
        self.cooldownUntil=Date.now()+65000;
      })
      .then(function(){clearTimeout(timer);self.fetching=false;setSrc();});
  },
  // returns a float in [0,1); quantum when buffer has entropy, else Math.random
  next:function(){
    if(this.remaining()<=this.LOW)this.refill();
    if(this.i<this.buf.length){
      this.usedQuantum=true;
      return this.buf[this.i++]/65536;
    }
    this.usedQuantum=false;
    return Math.random();
  }
};
// R() is the single random source used everywhere below.
function R(){return QRNG.next();}

// entropy-source indicator
var srcEl=document.getElementById('src'),srcLbl=document.getElementById('srclbl');
function setSrc(){
  var q=QRNG.usedQuantum && QRNG.remaining()>0;
  srcEl.className=q?'q':'f';
  srcLbl.textContent=q?('quantum · '+QRNG.remaining()):'fallback';
}
QRNG.refill();
setInterval(function(){QRNG.refill();setSrc();},2000);
setSrc();
function ri(a,b){return F(R()*(b-a+1))+a;}
function pick(a){return a[F(R()*a.length)];}
function chance(p){return R()<p;}

var FONTS=['Georgia','Times New Roman','Courier New','Arial Black','Impact','Comic Sans MS',
  'monospace','cursive','fantasy','Verdana','Trebuchet MS','Palatino','Garamond','Brush Script MT',
  'Lucida Console','Tahoma','system-ui','serif','Noto Naskh Arabic','Amiri','Scheherazade'];

// ---- arabic-looking / scrambled glyph soup (NO readable words) ----
// arabic letters, presentation forms, persian/urdu extras, diacritics, tashkeel
var ARABIC=('ابتثجحخدذرزسشصضطظعغفقكلمنهوي'+
  'ٱآأؤإئءةىﻻﷲﻵﻷﻹ'+
  'ٹپچڈڑژکگںھہۃیےۀۂ'+
  'ﺎﺏﺕﺙﺝﺡﺥﺩﺫﺭﺯﺱﺵﺹﺽﻁﻅﻉﻍﻑﻕﻙﻝﻡﻥﻩﻭﻱ'+
  'ﴼﴽ﷽؈؉؊؋').split('');
var TASHKEEL=('ًٌٍَُِّْٰٓٔۖۗۘۙۚۛۜ').split('');
var ANUM='٠١٢٣٤٥٦٧٨٩۰۱۲۳۴۵۶۷۸۹'.split('');
function glyphRun(){
  var n=ri(1,9),s='';
  for(var i=0;i<n;i++){
    s+=chance(.12)?pick(ANUM):pick(ARABIC);
    var k=ri(0,2);for(var j=0;j<k;j++)s+=pick(TASHKEEL);
    if(chance(.25))s+=' ';
  }
  return s;
}
var GLITCH='̴̵̶̷̸̡̢̧̨̛̖̗̘̙̜̝̞̟̠̣̤̥̦̩̪̫̬̭̮̯̰̱̲̳̹̺̻̼͇͈͉͍͎';
function zalgo(s,amt){
  var o='';
  for(var i=0;i<s.length;i++){o+=s[i];var k=ri(0,amt||3);for(var j=0;j<k;j++)o+=GLITCH[F(R()*GLITCH.length)];}
  return o;
}
var EMOJI=['🌀','👁️','🍕','🪐','🦷','🧿','🐛','🔮','💀','🌈','🦑','🧠','🫠','👾','🌸','🗿','🪼','🤡','🥴','🦠','🍄','🛸','🦴','🫥','🌶️','🧊','🪩','🎈','🥩','🪲','🦞','🪿','🕳️','🫧','🔥','⚡','💥','✨','🌪️','🩸','🦇','🕷️','🐙','🪬','☢️','☣️','🧬','🌋','⛧','🫀'];

function randColor(){return 'hsl('+ri(0,360)+','+ri(40,100)+'%,'+ri(30,88)+'%)';}

var stage=document.getElementById('stage');
var W=innerWidth,H=innerHeight;
addEventListener('resize',function(){W=innerWidth;H=innerHeight;});

// content is ONLY emojis + arabic-looking/scrambled glyphs
function content(){
  var k=R();
  if(k<0.42) return chance(.35)?zalgo(glyphRun(),ri(1,5)):glyphRun();      // scrambled arabic glyphs
  if(k<0.82){var e=pick(EMOJI);var n=ri(1,4),s=e;for(var i=1;i<n;i++)s+=pick(EMOJI);return s;} // emoji bursts
  return zalgo(pick(ARABIC),ri(3,10));                                      // single zalgo'd glyph
}

var blobs=[];
var MAX=260;
function styleBlob(el){
  el.style.fontFamily=pick(FONTS);
  el.style.fontSize=ri(10,180)+'px';
  el.style.color=randColor();
  el.style.fontWeight=chance(.5)?'900':'normal';
  el.style.fontStyle=chance(.3)?'italic':'normal';
  el.style.letterSpacing=chance(.4)?ri(-6,22)+'px':'';
  el.style.textShadow=chance(.35)?'0 0 '+ri(2,40)+'px '+randColor():'';
  el.style.mixBlendMode=chance(.3)?pick(['difference','exclusion','screen','overlay','hue','color-dodge']):'';
  if(chance(.35)){el.classList.add('spin');el.style.setProperty('--sp',(R()*7+.6).toFixed(2)+'s');}
  else el.classList.remove('spin');
}
function makeBlob(){
  if(blobs.length>=MAX)return;
  var el=document.createElement('div');
  el.className='blob';
  el.textContent=content();
  styleBlob(el);
  var b={el:el,
    x:R()*W,y:R()*H,
    vx:(R()-.5)*3.4,vy:(R()-.5)*3.4,
    rot:R()*360,vr:(R()-.5)*5,
    jit:R()*7,
    life:ri(30,240),                 // frames until it may die
    drift:chance(.6)};
  blobs.push(b);
  stage.appendChild(el);
  beep(chance(.5));                   // sound on spawn
  return b;
}
// dense initial burst
for(var i=0;i<120;i++)makeBlob();

// ---------- WEB AUDIO: layered, feral, random ----------
var actx=null, master=null, started=false, droneOn=false;
function ensureAudio(){
  if(actx)return;
  try{
    actx=new (window.AudioContext||window.webkitAudioContext)();
    master=actx.createGain();master.gain.value=.5;master.connect(actx.destination);
  }catch(e){}
}
function beep(loud){
  if(!actx||actx.state!=='running')return;
  try{
    var t=actx.currentTime;
    var voices=ri(1,3);
    for(var v=0;v<voices;v++){
      var o=actx.createOscillator(),g=actx.createGain();
      o.type=pick(['sine','square','sawtooth','triangle']);
      var f0=ri(60,2600);
      o.frequency.setValueAtTime(f0,t);
      // random glide, sometimes wild
      o.frequency.linearRampToValueAtTime(ri(40,3600),t+(R()*.4+.05));
      // random detune / vibrato via a second osc modulating? keep it cheap: just detune
      o.detune.value=ri(-60,60);
      var peak=(loud?.09:.05)*(R()*.9+.2);
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(peak,t+.01);
      var dur=R()*.5+.06;
      g.gain.exponentialRampToValueAtTime(.0001,t+dur);
      // optional bandpass for texture
      if(chance(.4)){
        var bp=actx.createBiquadFilter();
        bp.type=pick(['bandpass','lowpass','highpass','notch']);
        bp.frequency.value=ri(200,4000);bp.Q.value=R()*18+1;
        o.connect(bp);bp.connect(g);
      }else o.connect(g);
      g.connect(master);
      o.start(t);o.stop(t+dur+.02);
    }
    // occasional noise burst / hit
    if(chance(.18)){
      var len=F(actx.sampleRate*(R()*.15+.03));
      var buf=actx.createBuffer(1,len,actx.sampleRate),d=buf.getChannelData(0);
      for(var i2=0;i2<len;i2++)d[i2]=(R()*2-1)*(1-i2/len);
      var src=actx.createBufferSource();src.buffer=buf;
      var ng=actx.createGain();ng.gain.value=.05*(R()+.2);
      src.connect(ng);ng.connect(master);src.start(t);
    }
  }catch(e){}
}
function startDrone(){
  if(droneOn||!actx)return;droneOn=true;
  try{
    var o=actx.createOscillator(),g=actx.createGain(),lfo=actx.createOscillator(),lg=actx.createGain();
    o.type='sawtooth';o.frequency.value=ri(40,90);
    lfo.frequency.value=R()*.4+.05;lg.gain.value=ri(4,20);
    lfo.connect(lg);lg.connect(o.frequency);
    g.gain.value=.015;o.connect(g);g.connect(master);
    o.start();lfo.start();
  }catch(e){}
}
function unlock(){
  ensureAudio();
  if(actx&&actx.state!=='running')actx.resume();
  started=true;startDrone();
  document.getElementById('hint').textContent='no going back';
}
['pointerdown','keydown','touchstart'].forEach(function(ev){
  addEventListener(ev,unlock,{passive:true});
});

// ---------- INTERACTION ----------
addEventListener('pointermove',function(e){
  if(chance(.5)){var b=makeBlob();if(b){b.x=e.clientX+ri(-40,40);b.y=e.clientY+ri(-40,40);}}
});
var flash=document.getElementById('flash');
addEventListener('pointerdown',function(e){
  flash.style.background=randColor();flash.style.opacity=.65;
  setTimeout(function(){flash.style.transition='opacity .35s';flash.style.opacity=0;
    setTimeout(function(){flash.style.transition='';},380);},30);
  for(var i=0;i<24;i++){var b=makeBlob();if(b){b.x=e.clientX+ri(-120,120);b.y=e.clientY+ri(-120,120);}}
  for(var j=0;j<blobs.length;j++)if(chance(.55)){blobs[j].x=R()*W;blobs[j].y=R()*H;}
  document.body.style.background=chance(.5)?'#000':randColor();
  for(var k=0;k<ri(2,5);k++)beep(true);
});

// ---------- FAST CHAOS SPAWNER ----------
// dense, rapid spawning bursts
setInterval(function(){
  var n=ri(2,7);
  for(var i=0;i<n;i++)if(chance(.85))makeBlob();
},90);
// restyle + rescatter random existing blobs constantly
setInterval(function(){
  for(var i=0;i<6;i++){var b=pick(blobs);if(!b)break;
    if(chance(.6)){styleBlob(b.el);b.el.textContent=content();}
    if(chance(.4)){b.x=R()*W;b.y=R()*H;}
    if(chance(.5))beep(false);
  }
},140);
// background flicker
setInterval(function(){
  document.body.style.background=chance(.4)?'hsl('+ri(0,360)+',60%,'+ri(3,14)+'%)':'#000';
},900);

// ---------- ANIMATION LOOP ----------
function tick(){
  for(var i=blobs.length-1;i>=0;i--){
    var b=blobs[i];
    if(b.drift){b.x+=b.vx;b.y+=b.vy;
      if(b.x<-120)b.x=W+60;if(b.x>W+120)b.x=-60;
      if(b.y<-120)b.y=H+60;if(b.y>H+120)b.y=-60;}
    b.rot+=b.vr;
    var jx=(R()-.5)*b.jit, jy=(R()-.5)*b.jit;
    b.el.style.transform='translate('+(b.x+jx)+'px,'+(b.y+jy)+'px) rotate('+b.rot+'deg)';
    b.life--;
    // churn: kill old ones so density stays high but content keeps refreshing
    if(b.life<=0&&(blobs.length>90||chance(.02))){
      stage.removeChild(b.el);blobs.splice(i,1);
    }
  }
  requestAnimationFrame(tick);
}
tick();

// ---------- CANVAS STATIC ----------
var nz=document.getElementById('noise'),nc=nz.getContext('2d');
function sizeNz(){nz.width=W/4;nz.height=H/4;nz.style.width=W+'px';nz.style.height=H+'px';}
sizeNz();addEventListener('resize',sizeNz);
function noise(){
  var id=nc.createImageData(nz.width,nz.height),d=id.data;
  for(var i=0;i<d.length;i+=4){var v=F(R()*255);d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}
  nc.putImageData(id,0,0);
  setTimeout(function(){requestAnimationFrame(noise);},50);
}
noise();

// title flickers glyph nonsense
setInterval(function(){document.title=zalgo(glyphRun(),ri(1,6));},700);
})();
</script>
</body>
</html>
